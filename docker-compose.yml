# FairBet Lab — entorno completo del challenge
#
# Arranque rápido:
#   cp .env.example .env
#   docker compose up -d --build
#
# URLs locales:
#   Web (páginas + API)  → http://localhost:8000
#   WebSockets (cuotas)  → ws://localhost:8001
#
# Nombre visible en Docker Desktop:
name: simulador-apuestas-deportivas

services:
  # --- Persistencia ---
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fairbet}
      POSTGRES_USER: ${POSTGRES_USER:-fairbet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fairbet_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fairbet} -d ${POSTGRES_DB:-fairbet}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Cache, Celery y Channels ---
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- Aplicación Django (HTTP) ---
  web:
    build: .
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # --- Tareas en segundo plano ---
  celery:
    build: .
    command: >
      sh -c "python manage.py migrate --noinput &&
             celery -A config worker -l info"
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_started

  celery-beat:
    build: .
    command: >
      sh -c "python manage.py migrate --noinput &&
             celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler"
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_started

  # --- WebSockets para cuotas en vivo (Daphne) ---
  channels:
    build: .
    command: daphne -b 0.0.0.0 -p 8001 config.asgi:application
    volumes:
      - .:/app
    ports:
      - "8001:8001"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_started

volumes:
  postgres_data:
